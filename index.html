    <script type="text/javascript">
        const htmlElement = document.documentElement;
        
        // 1. Theme Logic: Check local storage for preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            htmlElement.setAttribute('data-theme', savedTheme);
        }

        // 2. Add event listeners to all theme toggle buttons (mobile + desktop)
        const toggleButtons = document.querySelectorAll('.theme-toggle-btn');

        toggleButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const currentTheme = htmlElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                htmlElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            });
        });

        // 3. Mobile Menu Logic
        const mobileMenu = document.getElementById('mobile-menu');
        const openMenuBtn = document.getElementById('mobile-menu-open-btn');
        const closeMenuBtn = document.getElementById('mobile-menu-close-btn');

        openMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.remove('hidden');
        });

        closeMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
        });
    </script>
</body>
